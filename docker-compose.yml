version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: extra_docs_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RESEND_API_KEY=${RESEND_API_KEY}
    volumes:
      - .env:/app/.env
